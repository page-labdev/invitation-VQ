<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation V3 Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL SYSTEM
========================= */
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:#f6f3ef;
  color:#2b2b2b;
  overflow-x:hidden;
}

/* soft atmospheric background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,0,0,0.05), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.04), transparent 45%);
  pointer-events:none;
}

/* =========================
   ENVELOPE GATE (ENTRY)
========================= */
.envelope{
  position:fixed;
  inset:0;
  background:#eae5de;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
  transition:1.2s cubic-bezier(.16,1,.3,1);
}

.envelope.open{
  transform:translateY(-110%);
  opacity:0;
}

/* =========================
   TIMELINE SECTIONS
========================= */
.section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:60px 20px;

  opacity:0;
  transform:translateY(80px);
  filter:blur(10px);

  transition:1.4s cubic-bezier(.16,1,.3,1);
}

.section.active{
  opacity:1;
  transform:translateY(0);
  filter:blur(0);
}

/* content container */
.container{
  max-width:600px;
}

/* =========================
   TYPOGRAPHY SYSTEM
========================= */
h1,h2{
  font-family:'Playfair Display',serif;
  letter-spacing:2px;
  font-weight:400;
}

h1{font-size:42px}
h2{font-size:32px}

p{
  line-height:1.8;
  opacity:.8;
}

/* =========================
   STAGGER ANIMATION
========================= */
.stagger > *{
  opacity:0;
  transform:translateY(30px);
}

.section.active .stagger > *{
  animation:staggerIn 1s forwards cubic-bezier(.16,1,.3,1);
}

.stagger > *:nth-child(1){animation-delay:.1s}
.stagger > *:nth-child(2){animation-delay:.25s}
.stagger > *:nth-child(3){animation-delay:.4s}
.stagger > *:nth-child(4){animation-delay:.55s}

@keyframes staggerIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
   TEXT REVEAL ENGINE
========================= */
.reveal span{
  display:inline-block;
  opacity:0;
  transform:translateY(18px);
}

.section.active .reveal span{
  animation:letter .8s forwards cubic-bezier(.16,1,.3,1);
}

@keyframes letter{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
   VISUAL DEPTH (IMPORTANT)
========================= */
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
}

/* =========================
   BUTTON
========================= */
button{
  padding:12px 24px;
  background:#000;
  color:#fff;
  border:none;
  margin-top:15px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- =========================
     ENVELOPE ENTRY
========================= -->
<div class="envelope" id="envelope">
  <h3>OPEN INVITATION</h3>
</div>

<!-- =========================
     STORY ENGINE
========================= -->

<section class="section">
  <div class="container stagger">
    <h1 class="reveal">ՀՐԱՎԻՐԱՏՈՄՍ</h1>
    <p>Save the date</p>
  </div>
</section>

<section class="section">
  <div class="container stagger">
    <h2 class="reveal">ԱՆՈՒՆ</h2>
    <p>&</p>
    <h2 class="reveal">ԱՆՈՒՆ</h2>
  </div>
</section>

<section class="section">
  <div class="container stagger">
    <p>
      Մենք սիրով հրավիրում ենք Ձեզ կիսելու մեր կյանքի ամենակարևոր օրը։
    </p>
  </div>
</section>

<section class="section">
  <div class="container stagger card">
    <p>📅 00.00.2026</p>
    <p>📍 Երևան</p>
    <p>⏰ 14:00</p>
  </div>
</section>

<section class="section">
  <div class="container stagger">
    <h2 class="reveal">RSVP</h2>
    <input placeholder="Անուն">
    <br>
    <button>Հաստատել</button>
  </div>
</section>

<script>

/* =========================
   ENVELOPE SYSTEM
========================= */
const envelope = document.getElementById("envelope");

envelope.addEventListener("click", () => {
  envelope.classList.add("open");
});

/* =========================
   SCROLL TIMELINE ENGINE
========================= */
const sections = document.querySelectorAll(".section");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("active");
    }
  });
},{ threshold: 0.35 });

sections.forEach(sec => observer.observe(sec));

/* =========================
   LETTER SPLIT ENGINE
========================= */
function splitText(){
  document.querySelectorAll(".reveal").forEach(el=>{
    const text = el.innerText;
    el.innerHTML = "";

    [...text].forEach((char, i)=>{
      const span = document.createElement("span");
      span.innerText = char === " " ? "\u00A0" : char;
      span.style.animationDelay = (i * 0.04) + "s";
      el.appendChild(span);
    });
  });
}

splitText();

</script>

</body>
</html>
