<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Invitation</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP CORE -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

</head>

<body>

<div class="story">

  <!-- SCENE 1 -->
  <section class="panel" id="scene1">
    <div class="layer bg"></div>
    <div class="layer envelope"></div>

    <h1 class="title">Scroll to Begin</h1>
  </section>

  <!-- SCENE 2 -->
  <section class="panel" id="scene2">
    <div class="letter">
      <h2>You're Invited</h2>
      <p>A private cinematic experience awaits.</p>
    </div>
  </section>

  <!-- SCENE 3 -->
  <section class="panel" id="scene3">
    <div class="experience">
      <h2>The Experience</h2>
      <p>Minimal. Elegant. Emotional.</p>
    </div>
  </section>

  <!-- SCENE 4 -->
  <section class="panel" id="scene4">
    <div class="cta">
      <h2>Join Us</h2>
      <button>RSVP</button>
    </div>
  </section>

</div>

<script src="script.js"></script>

</body>
</html>
