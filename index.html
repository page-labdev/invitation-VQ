<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cinematic Invitation</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

</head>

<body>

<div class="story">

  <!-- SCENE 1: ENVELOPE ARRIVAL -->
  <section class="scene" id="s1">

    <div class="layer bg"></div>
    <div class="layer glow"></div>

    <img class="envelope"
         src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/5.png?v=1776161359"/>

    <div class="text">
      <h1>Սահեցրու ներքև</h1>
      <p>Քո հրավերը բացահայտելու համար</p>
    </div>

  </section>

  <!-- SCENE 2: LETTER -->
  <section class="scene" id="s2">

    <img class="paper" src="https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17"/>

    <div class="letter-text">
      <h2>Դու հրավիրված ես</h2>
      <p>Մի բացառիկ երեկոյի, որտեղ ամեն ինչ ունի զգացում</p>
    </div>

  </section>

  <!-- SCENE 3: EXPERIENCE -->
  <section class="scene" id="s3">

    <div class="experience">
      <h2>Փորձառություն</h2>
      <p>Նուրբ, մինիմալ և էմոցիոնալ ձևավորված աշխարհ</p>
    </div>

  </section>

  <!-- SCENE 4: CTA -->
  <section class="scene" id="s4">

    <div class="cta">
      <h2>Միացիր մեզ</h2>
      <button>RSVP</button>
    </div>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
