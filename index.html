<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#1f1b17;
  font-family: sans-serif;
}

/* PAGES */
.page {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CONTENT */
.page-content {
  text-align:center;
}

/* === NEW SEQUENTIAL SYSTEM === */

/* hidden state */
.reveal-item,
.reveal-image {
  opacity:0;
  transform:translateY(20px);
  filter:blur(6px);
}

/* active page triggers animation */
.page.active .reveal-item,
.page.active .reveal-image {
  animation:smoothReveal 0.8s ease forwards;
}

/* stagger */
.page.active .reveal-item:nth-child(1),
.page.active .reveal-image:nth-child(1){animation-delay:.2s;}
.page.active .reveal-item:nth-child(2),
.page.active .reveal-image:nth-child(2){animation-delay:.5s;}
.page.active .reveal-item:nth-child(3){animation-delay:.8s;}
.page.active .reveal-item:nth-child(4){animation-delay:1.1s;}
.page.active .reveal-item:nth-child(5){animation-delay:1.4s;}

@keyframes smoothReveal {
  to {
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
  }
}

/* TYPEWRITER */
.typewrite {
  overflow:hidden;
  white-space:nowrap;
  border-right:2px solid gold;
  width:0;
}

.page.active .typewrite {
  animation:typing 2s steps(30,end) forwards, blink .8s infinite;
}

@keyframes typing {
  to { width:100%; }
}
@keyframes blink {
  50% { border-color:transparent; }
}

/* styling */
h1 {
  font-family:'Dancing Script';
  font-size:3rem;
  color:#c6a43b;
}

p {
  color:#eee;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<section class="page">
  <div class="page-content">
    <img class="reveal-image" src="https://via.placeholder.com/300" />
    <h1 class="reveal-item">Վրեժ & Քրիստինե</h1>
    <p class="reveal-item">SAVE THE DATE</p>
    <p class="reveal-item">16 Օգոստոսի, 2026</p>
  </div>
</section>

<!-- PAGE 2 -->
<section class="page">
  <div class="page-content">
    <p class="reveal-item typewrite">Հարգելի հյուրեր,</p>
    <p class="reveal-item">մոտենում է մեր կյանքի կարևոր օրը</p>
    <p class="reveal-item">սիրով հրավիրում ենք ձեզ</p>
  </div>
</section>

<script>

/* PAGE BASED REVEAL */
const pages = document.querySelectorAll('.page');

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('active');
    }
  });
},{threshold:0.4});

pages.forEach(p=>observer.observe(p));

</script>

</body>
</html>
