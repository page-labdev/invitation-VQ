<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Հրավիրատոմս · Անի & Արման</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f3ea;
      font-family: 'Cormorant Garamond', Georgia, serif;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(180,140,80,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(160,120,60,0.06) 0%, transparent 55%);
      pointer-events: none;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding-bottom: 3rem;
    }

    .envelope-wrap {
      position: relative;
      width: 440px;
      cursor: pointer;
      perspective: 800px;
    }

    .envelope {
      position: relative;
      width: 440px;
      height: 280px;
      transition: transform 0.3s ease;
    }

    .envelope-wrap:hover .envelope {
      transform: translateY(-4px);
    }

    .envelope-back {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #f5ede0 0%, #ede0c8 100%);
      border-radius: 4px;
      border: 0.5px solid #d4b896;
      overflow: hidden;
    }

    .envelope-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(180,140,100,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200,160,110,0.06) 0%, transparent 60%);
    }

    .flap-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to top, #e8d5b8 0%, #f0e2c8 100%);
      clip-path: polygon(0 100%, 50% 0%, 100% 100%);
      border-bottom: 0.5px solid #c9a87a;
    }

    .flap-left {
      position: absolute;
      top: 0; left: 0;
      width: 52%; height: 100%;
      background: linear-gradient(135deg, #ede0c8 0%, #e8d5b8 100%);
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }

    .flap-right {
      position: absolute;
      top: 0; right: 0;
      width: 52%; height: 100%;
      background: linear-gradient(225deg, #ede0c8 0%, #e8d5b8 100%);
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    .flap-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to bottom, #e8d4b5 0%, #f0e0c5 60%, transparent 100%);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top center;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
      border-top: 0.5px solid #c9a87a;
    }

    .envelope-wrap.open .flap-top {
      transform: rotateX(-180deg);
    }

    .wax-seal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 48px; height: 48px;
      background: radial-gradient(circle at 40% 35%, #8b3a3a 0%, #6b2020 60%, #4a1515 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25), inset 0 1px 2px rgba(255,255,255,0.1);
      transition: opacity 0.3s ease;
      cursor: pointer;
    }

    .envelope-wrap.open .wax-seal {
      opacity: 0;
      pointer-events: none;
    }

    .wax-seal svg {
      width: 28px; height: 28px;
      opacity: 0.85;
    }

    .card-wrapper {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(0%);
      width: 380px;
      transition: transform 0.7s cubic-bezier(0.34, 1.2, 0.64, 1);
      z-index: 5;
      pointer-events: none;
    }

    .envelope-wrap.open .card-wrapper {
      transform: translateX(-50%) translateY(-108%);
      pointer-events: auto;
    }

    .invite-card {
      width: 380px;
      background: linear-gradient(160deg, #fefcf8 0%, #faf5ec 100%);
      border: 0.5px solid #d4b896;
      border-radius: 3px;
      padding: 2rem 2.2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .invite-card::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 0.5px solid rgba(180,140,90,0.35);
      border-radius: 2px;
      pointer-events: none;
    }

    .card-ornament {
      color: #b8924e;
      font-size: 20px;
      letter-spacing: 8px;
      margin-bottom: 0.6rem;
      opacity: 0.7;
    }

    .card-subtitle {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #a07840;
      margin-bottom: 1.2rem;
    }

    .card-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1rem 0;
    }

    .card-divider-line {
      flex: 1;
      height: 0.5px;
      background: linear-gradient(to right, transparent, #c9a87a, transparent);
    }

    .card-divider-diamond {
      width: 5px; height: 5px;
      background: #b8924e;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .card-names {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: #3d2b1a;
      line-height: 1.3;
      margin: 0.4rem 0;
    }

    .card-tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px;
      color: #8b6840;
      font-style: italic;
      margin-top: 0.2rem;
    }

    .card-event {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8b6840;
      margin: 1.2rem 0 0.5rem;
    }

    .card-date {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 300;
      color: #3d2b1a;
      margin: 0.2rem 0;
    }

    .card-time-place {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px;
      color: #8b6840;
      font-style: italic;
      line-height: 1.6;
      margin-top: 0.3rem;
    }

    .card-footer {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #b8924e;
      margin-top: 1.2rem;
      opacity: 0.6;
    }

    .open-btn {
      margin-top: 1.5rem;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8b6840;
      background: transparent;
      border: 0.5px solid #c9a87a;
      border-radius: 2px;
      padding: 8px 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0.8;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .open-btn:hover {
      background: rgba(180,140,90,0.08);
      opacity: 1;
    }

    .envelope-wrap.open .open-btn {
      display: none;
    }

    .hint {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 12px;
      color: #a07840;
      font-style: italic;
      margin-top: 0.8rem;
      opacity: 0.7;
      text-align: center;
      transition: opacity 0.3s;
    }

    .envelope-wrap.open + .hint,
    .envelope-wrap.open .hint {
      opacity: 0;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .envelope-wrap { width: 320px; }
      .envelope { width: 320px; height: 204px; }
      .card-wrapper { width: 280px; }
      .invite-card { width: 280px; padding: 1.4rem 1.4rem; }
      .card-names { font-size: 22px; }
      .card-date { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="envelope-wrap" id="envWrap">
      <div class="envelope">
        <div class="envelope-back">
          <div class="flap-left"></div>
          <div class="flap-right"></div>
          <div class="flap-bottom"></div>
          <div class="flap-top"></div>
          <div class="wax-seal" onclick="openEnvelope()">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 3 L16.5 10.5 L24.5 10.5 L18.5 15 L21 22.5 L14 18 L7 22.5 L9.5 15 L3.5 10.5 L11.5 10.5 Z"
                fill="rgba(255,220,180,0.5)" stroke="rgba(255,220,180,0.8)" stroke-width="0.8"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="card-wrapper">
        <div class="invite-card">
          <div class="card-ornament">— ✦ —</div>
          <div class="card-subtitle">Հրավիրատոմս</div>

          <div class="card-divider">
            <div class="card-divider-line"></div>
            <div class="card-divider-diamond"></div>
            <div class="card-divider-line"></div>
          </div>

          <div class="card-names">Անի &amp; Արման</div>
          <div class="card-tagline">հրավիրում են ձեզ</div>

          <div class="card-divider">
            <div class="card-divider-line"></div>
            <div class="card-divider-diamond"></div>
            <div class="card-divider-line"></div>
          </div>

          <div class="card-event">Հարսանիք</div>
          <div class="card-date">15 Հուլիսի, 2025</div>
          <div class="card-time-place">
            18:00<br>
            «Արարատ» Բանկետային Դահլիճ<br>
            Երևան, Հայաստան
          </div>

          <div class="card-divider" style="margin:1.2rem 0 0.8rem">
            <div class="card-divider-line"></div>
            <div class="card-divider-diamond"></div>
            <div class="card-divider-line"></div>
          </div>

          <div class="card-footer">R.S.V.P · +374 91 000 000</div>
        </div>
      </div>

      <button class="open-btn" onclick="openEnvelope()">Բացել հրավիրատոմսը</button>
      <div class="hint">Կտտացրեք կնիքի վրա</div>
    </div>
  </div>

  <script>
    function openEnvelope() {
      document.getElementById('envWrap').classList.toggle('open');
    }
  </script>
</body>
</html>
