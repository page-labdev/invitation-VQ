<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Վրերժ & Քրիստինե — Հարսանեկան հրավեր</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&family=Great+Vibes&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&family=Allura&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1f1b17;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ENVELOPE */
    .envelope-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, #fcf3e4, #e9d9c4);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s ease;
    }

    .envelope {
      width: 320px;
      height: 210px;
      background: #f8ede0;
      border-radius: 14px;
      position: relative;
      cursor: pointer;
      box-shadow: 0 40px 50px -25px rgba(0,0,0,0.5);
      transition: all 0.8s ease;
    }

    .envelope-flap {
      position: absolute;
      top: 0;
      width: 100%;
      height: 50%;
      background: #e8d5c0;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top;
      transition: transform 0.9s ease;
    }

    .envelope-body {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 50%;
      background: #ecdccb;
    }

    .envelope-card {
      position: absolute;
      width: 85%;
      left: 7.5%;
      bottom: 10px;
      background: #fffaf5;
      padding: 18px;
      border-radius: 10px;
      text-align: center;
      font-family: 'Great Vibes', cursive;
      font-size: 1.6rem;
      color: #b1623a;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.6s ease;
    }

    .envelope.open {
      transform: scale(1.7);
      opacity: 0;
      pointer-events: none;
    }

    .envelope.open .envelope-flap {
      transform: rotateX(180deg);
    }

    .envelope.open .envelope-card {
      opacity: 1;
      transform: translateY(-20px);
    }

    /* MAIN */
    .scroll-container {
      height: 100vh;
      overflow-y: auto;
      opacity: 0;
      transition: 1.2s ease;
    }

    .scroll-container.visible {
      opacity: 1;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 2rem;
    }

    /* LUXURY NAME FIX */
    .luxury-name {
      font-family: 'Allura', 'Great Vibes', cursive;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 5rem);
      color: #d4af37;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
  </style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope-overlay" id="envelopeOverlay">
  <div class="envelope" id="envelope">
    <div class="envelope-flap"></div>
    <div class="envelope-body"></div>

    <div class="envelope-card">
      Վրերժ & Քրիստինե<br>
      <span style="font-size:0.8rem;">16.08.2026</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="scroll-container" id="scrollContainer">

  <section class="page">
    <div class="luxury-name">Վրերժ & Քրիստինե</div>
    <p style="margin-top:20px; color:#caa86a;">16 Օգոստոսի, 2026</p>
  </section>

</div>

<!-- AUDIO -->
<script>
let audio = null;

function startMusic() {
  if (audio) return;

  audio = new Audio("https://cdn.pixabay.com/download/audio/2022/02/22/audio_bb2d9c8b6c.mp3?filename=ed-sheeran-perfect-instrumental-piano-version-14410.mp3");
  audio.loop = true;
  audio.volume = 0.28;

  setTimeout(() => {
    audio.play().catch(() => {
      console.log("Autoplay blocked");
    });
  }, 600);
}

// ENVELOPE CLICK
const envelope = document.getElementById("envelope");
const overlay = document.getElementById("envelopeOverlay");
const container = document.getElementById("scrollContainer");

envelope.addEventListener("click", () => {

  envelope.classList.add("open");

  // MUSIC ONLY HERE ✔
  startMusic();

  setTimeout(() => {
    overlay.style.display = "none";
    container.classList.add("visible");
  }, 900);

});
</script>

</body>
</html>
