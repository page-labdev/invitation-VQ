<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Montserrat',sans-serif;
  background:#f7f4f0;
  color:#2b2b2b;
  overflow-x:hidden;
}

/* BUILDER CORE */
.builder{
  width:100%;
}

.block{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
  position:relative;
}

/* TYPO */
h1,h2{
  font-family:'Playfair Display',serif;
  letter-spacing:2px;
}

.names{
  font-size:64px;
}

.text{
  max-width:520px;
  line-height:1.8;
  opacity:.8;
}

/* ANIMATION ENGINE */
.anim{
  opacity:0;
  transform:translateY(80px);
  transition:1.2s cubic-bezier(.2,.6,.2,1);
}

.anim.show{
  opacity:1;
  transform:translateY(0);
}

/* DELAY SYSTEM */
[data-delay="1"]{transition-delay:.2s}
[data-delay="2"]{transition-delay:.4s}
[data-delay="3"]{transition-delay:.6s}

/* ENVELOPE */
.envelope{
  position:fixed;
  inset:0;
  background:#eae5de;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
  transition:1s ease;
}
.envelope.open{
  transform:translateY(-100%);
}

/* SCROLL SNAP (like Apple) */
html{
  scroll-snap-type:y mandatory;
}
.block{
  scroll-snap-align:start;
}

/* RSVP */
input{
  padding:12px;
  border:1px solid #ddd;
  margin:6px 0;
  width:240px;
}

button{
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .names{font-size:40px}
}

</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope" onclick="openEnvelope()">
  ԲԱՑԵԼ ՀՐԱՎԻՐԱՏՈՄՍԸ
</div>

<div class="builder">

<!-- HERO -->
<div class="block">
  <div>
    <h1 class="anim">ՀՐԱՎԻՐԱՏՈՄՍ</h1>
    <div class="text anim" data-delay="1">SAVE THE DATE</div>
  </div>
</div>

<!-- NAMES -->
<div class="block">
  <div>
    <div class="names anim">ԱՆՈՒՆ</div>
    <div class="anim" data-delay="1">&</div>
    <div class="names anim" data-delay="2">ԱՆՈՒՆ</div>
  </div>
</div>

<!-- STORY -->
<div class="block">
  <div class="text anim">
    Սիրով հրավիրում ենք Ձեզ կիսելու մեր կյանքի ամենակարևոր օրը
  </div>
</div>

<!-- DATE -->
<div class="block">
  <h2 class="anim">00.00.2026</h2>
</div>

<!-- DETAILS -->
<div class="block">
  <div class="text anim">
    Ժամը՝ 14:00<br><br>
    Վայրը՝ Ռեստորան<br>
    Հասցե՝ Երևան
  </div>
</div>

<!-- RSVP -->
<div class="block">
  <div>
    <h2 class="anim">RSVP</h2>
    <input class="anim" placeholder="Ձեր անունը">
    <input class="anim" data-delay="1" placeholder="Հեռախոսահամար">
    <button class="anim" data-delay="2">Հաստատել</button>
  </div>
</div>

</div>

<script>

/* ENVELOPE */
function openEnvelope(){
  document.querySelector('.envelope').classList.add('open');
}

/* BUILDER SCROLL ENGINE */
const elements = document.querySelectorAll('.anim');

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{threshold:.3});

elements.forEach(el=>observer.observe(el));

</script>

</body>
</html>
