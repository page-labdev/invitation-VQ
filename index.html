<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Հրավեր</title>

<link rel="stylesheet" href="style.css"/>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

</head>

<body>

<div class="story">

  <!-- SCENE 1: ENVELOPE -->
  <section class="scene" id="s1">

    <div class="bg"></div>

    <img class="envelope" 
         src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/5.png?v=1776161359" />

    <div class="text">
      <h1>Սահեցրու ներքև</h1>
      <p>Քո հրավերը բացահայտելու համար</p>
    </div>

  </section>

  <!-- SCENE 2 -->
  <section class="scene" id="s2">

    <div class="paper"></div>

    <div class="letter">
      <h2>Դու հրավիրված ես</h2>
      <p>Մի յուրահատուկ երեկոյի, որտեղ ամեն պահը ունի զգացում</p>
    </div>

  </section>

  <!-- SCENE 3 -->
  <section class="scene" id="s3">

    <div class="bg2"></div>

    <div class="experience">
      <h2>Փորձառություն</h2>
      <p>Նուրբ, մինիմալ, և էմոցիոնալ ձևավորված միջավայր</p>
    </div>

  </section>

  <!-- SCENE 4 -->
  <section class="scene" id="s4">

    <div class="cta">
      <h2>Միացիր մեզ</h2>
      <button>RSVP</button>
    </div>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
