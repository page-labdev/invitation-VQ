<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Montserrat',sans-serif;
  background:#f6f3ef;
  color:#2b2b2b;
  overflow-x:hidden;
}

/* ENVELOPE */
.envelope{
  position:fixed;
  width:100%;
  height:100vh;
  background:#e9e4de;
  z-index:9999;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
  transition:1s ease;
}

.envelope.open{
  transform:translateY(-100%);
}

.envelope-text{
  letter-spacing:4px;
  font-size:14px;
  opacity:.7;
}

/* SECTIONS */
section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

/* TYPOGRAPHY */
h1,h2{
  font-family:'Playfair Display',serif;
  letter-spacing:2px;
}

h1{font-size:36px}
h2{font-size:32px}

.names{
  font-size:64px;
}

.amp{
  margin:10px 0;
}

.text{
  max-width:500px;
  line-height:1.8;
  opacity:.8;
}

/* FADE ANIMATION */
.fade{
  opacity:0;
  transform:translateY(60px);
  transition:1.2s ease;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* DIVIDER */
.line{
  width:1px;
  height:80px;
  background:#ccc;
  margin:30px auto;
}

/* RSVP */
form{
  display:flex;
  flex-direction:column;
  gap:12px;
  width:260px;
}

input{
  padding:12px;
  border:1px solid #ddd;
}

button{
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .names{font-size:42px}
  h1{font-size:26px}
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope" onclick="openEnvelope()">
  <div class="envelope-text">ԲԱՑԵԼ ՀՐԱՎԻՐԱՏՈՄՍԸ</div>
</div>

<!-- HERO -->
<section class="fade">
  <h1>ՀՐԱՎԻՐԱՏՈՄՍ</h1>
  <div class="line"></div>
  <div class="text">SAVE THE DATE</div>
</section>

<!-- NAMES -->
<section class="fade">
  <div class="names">ԱՆՈՒՆ</div>
  <div class="amp">&</div>
  <div class="names">ԱՆՈՒՆ</div>
</section>

<!-- TEXT -->
<section class="fade">
  <div class="text">
    Սիրով հրավիրում ենք Ձեզ կիսելու մեր կյանքի ամենակարևոր օրը
  </div>
</section>

<!-- DATE -->
<section class="fade">
  <h2>00.00.2026</h2>
</section>

<!-- DETAILS -->
<section class="fade">
  <div class="text">
    Ժամը՝ 14:00<br><br>
    Վայրը՝ Ռեստորան<br>
    Հասցե՝ Երևան
  </div>
</section>

<!-- RSVP -->
<section class="fade">
  <h2>RSVP</h2>
  <form>
    <input placeholder="Ձեր անունը">
    <input placeholder="Հեռախոսահամար">
    <button>Հաստատել</button>
  </form>
</section>

<script>

// ENVELOPE OPEN
function openEnvelope(){
  document.querySelector('.envelope').classList.add('open');
}

// SCROLL ANIMATION
const elements=document.querySelectorAll('.fade');

const observer=new IntersectionObserver(entries=>{
 entries.forEach(entry=>{
  if(entry.isIntersecting){
   entry.target.classList.add('show');
  }
 });
});

elements.forEach(el=>observer.observe(el));

</script>

</body>
</html>
