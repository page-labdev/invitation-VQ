<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Montserrat',sans-serif;
  background:#f8f6f3;
  color:#2b2b2b;
  overflow-x:hidden;
}

/* GLOBAL */
section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

h1,h2{
  font-family:'Playfair Display',serif;
  letter-spacing:2px;
}

/* HERO */
.hero{
  background:#f3efe9;
}

.hero h1{
  font-size:42px;
  font-weight:400;
}

.hero .date{
  margin-top:20px;
  font-size:18px;
  letter-spacing:4px;
}

/* BIG NAMES */
.names{
  font-size:64px;
  margin:20px 0;
}

.amp{
  font-size:28px;
  margin:10px 0;
}

/* TEXT BLOCK */
.text{
  max-width:500px;
  line-height:1.8;
  opacity:.8;
}

/* DETAILS */
.details{
  font-size:18px;
  line-height:2;
}

/* SECTION FADE */
.fade{
  opacity:0;
  transform:translateY(60px);
  transition:1.2s ease;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* RSVP */
form{
  display:flex;
  flex-direction:column;
  gap:15px;
  width:280px;
}

input{
  padding:12px;
  border:1px solid #ddd;
}

button{
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* DIVIDER */
.line{
  width:1px;
  height:80px;
  background:#ccc;
  margin:30px auto;
}

/* MOBILE */
@media(max-width:768px){
  .names{font-size:42px}
  h1{font-size:28px}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero fade">
  <h1>ՀՐԱՎԻՐԱՏՈՄՍ</h1>
  <div class="date">SAVE THE DATE</div>
</section>

<!-- NAMES -->
<section class="fade">
  <div class="names">ԱՆՈՒՆ</div>
  <div class="amp">&</div>
  <div class="names">ԱՆՈՒՆ</div>
</section>

<!-- TEXT -->
<section class="fade">
  <div class="text">
    Սիրով հրավիրում ենք Ձեզ կիսելու մեր կյանքի ամենակարևոր օրը՝ մեր հարսանիքը
  </div>
</section>

<!-- DATE -->
<section class="fade">
  <h2>00.00.2026</h2>
</section>

<!-- DETAILS -->
<section class="fade">
  <div class="details">
    Ժամը՝ 14:00<br><br>
    Վայրը՝ Ռեստորան<br>
    Հասցե՝ Երևան
  </div>
</section>

<!-- DRESS CODE -->
<section class="fade">
  <h2>DRESS CODE</h2>
  <div class="text">Black & White</div>
</section>

<!-- RSVP -->
<section class="fade">
  <h2>RSVP</h2>

  <form>
    <input placeholder="Ձեր անունը">
    <input placeholder="Հեռախոսահամար">
    <button>Հաստատել</button>
  </form>
</section>

<script>
const elements = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
