<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Invitation Experience V7</title>

<link rel="stylesheet" href="style.css"/>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

</head>

<body>

<div class="story">

  <!-- SCENE 1: ARRIVAL -->
  <section class="scene" id="s1">
    <div class="layer bg"></div>
    <div class="layer glow"></div>
    <div class="envelope"></div>

    <div class="text">
      <h1>Scroll to open</h1>
      <p>A private invitation awaits</p>
    </div>
  </section>

  <!-- SCENE 2: OPENING -->
  <section class="scene" id="s2">
    <div class="paper"></div>
    <div class="letter">
      <h2>You are invited</h2>
      <p>An intimate evening shaped by light, sound, and presence.</p>
    </div>
  </section>

  <!-- SCENE 3: EXPERIENCE -->
  <section class="scene" id="s3">
    <div class="experience">
      <h2>The Experience</h2>
      <p>Minimal. Emotional. Timeless.</p>
    </div>
  </section>

  <!-- SCENE 4: IMMERSION -->
  <section class="scene" id="s4">
    <div class="immersive">
      <h2>Be Part of It</h2>
      <p>Step into the moment.</p>
    </div>
  </section>

  <!-- SCENE 5: CTA -->
  <section class="scene" id="s5">
    <div class="cta">
      <h2>Join Us</h2>
      <button>RSVP</button>
    </div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
